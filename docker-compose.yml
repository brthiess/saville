name: saville-local

services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.directus
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - directus_database:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:latest
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env.directus
    ports:
      - '${DIRECTUS_PORT:-8055}:8055'
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
      - directus_snapshots:/directus/snapshots
      - directus_temp:/directus/temp

volumes:
  directus_database:
  directus_uploads:
  directus_extensions:
  directus_snapshots:
  directus_temp:
