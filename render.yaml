databases:
  - name: saville-db
    plan: starter

services:
  - type: web
    name: saville-directus
    runtime: docker
    dockerfilePath: ./Dockerfile.directus
    healthCheckPath: /server/health
    plan: starter
    envVars:
      - key: KEY
        generateValue: true
      - key: SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PUBLIC_URL
        value: https://saville-directus.onrender.com
      - key: CORS_ENABLED
        value: "true"
      - key: CORS_ORIGIN
        sync: false
      - key: DB_CLIENT
        value: pg
      - key: DB_HOST
        fromDatabase:
          name: saville-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: saville-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: saville-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: saville-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: saville-db
          property: password

  - type: web
    name: saville-web
    runtime: static
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_DIRECTUS_URL
        value: /api
      - key: VITE_DIRECTUS_ADMIN_URL
        value: https://saville-directus.onrender.com/admin/login
      - key: VITE_DIRECTUS_ENFORCE_MEMBER_ROLE
        value: "false"
      - key: VITE_DIRECTUS_MEMBER_ROLE_ALLOWLIST
        sync: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://saville-directus.onrender.com/*
      - type: rewrite
        source: /*
        destination: /index.html